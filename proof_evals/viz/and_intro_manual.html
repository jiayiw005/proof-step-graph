                  nodes = new vis.DataSet([{"color": "#2A9D8F", "font": {"color": "white"}, "id": "gc_a1d2b73c658f", "label": "p \u2227 q \u2227 p", "shape": "ellipse", "size": 20, "title": "\u003cb\u003eGoal\u003c/b\u003e\u003cbr\u003e\u003ccode\u003ep \u2227 q \u2227 p\u003c/code\u003e\u003cbr\u003evars: p q : Prop; hp : p; hq : q\u003cbr\u003e\ud83d\udfe2 initial"}, {"color": "#F4A261", "font": {"color": "white"}, "id": "t0", "label": "constructor", "shape": "box", "size": 15, "title": "\u003cb\u003eTactic [0]\u003c/b\u003e\u003cbr\u003e\u003ccode\u003econstructor\u003c/code\u003e\u003cbr\u003euses: And.intro"}, {"color": "#4C9BE8", "font": {"color": "white"}, "id": "gc_ae1d8782dc0f", "label": "case left\np", "shape": "ellipse", "size": 20, "title": "\u003cb\u003eGoal\u003c/b\u003e\u003cbr\u003e\u003ccode\u003ep\u003c/code\u003e\u003cbr\u003ecase: left\u003cbr\u003evars: p q : Prop; hp : p; hq : q\u003cbr\u003e"}, {"color": "#4C9BE8", "font": {"color": "white"}, "id": "gc_45f722079cbd", "label": "case right\nq \u2227 p", "shape": "ellipse", "size": 20, "title": "\u003cb\u003eGoal\u003c/b\u003e\u003cbr\u003e\u003ccode\u003eq \u2227 p\u003c/code\u003e\u003cbr\u003ecase: right\u003cbr\u003evars: p q : Prop; hp : p; hq : q\u003cbr\u003e"}, {"color": "#F4A261", "font": {"color": "white"}, "id": "t1", "label": "exact hp", "shape": "box", "size": 15, "title": "\u003cb\u003eTactic [1]\u003c/b\u003e\u003cbr\u003e\u003ccode\u003eexact hp\u003c/code\u003e\u003cbr\u003e"}, {"color": "#F4A261", "font": {"color": "white"}, "id": "t2", "label": "constructor", "shape": "box", "size": 15, "title": "\u003cb\u003eTactic [2]\u003c/b\u003e\u003cbr\u003e\u003ccode\u003econstructor\u003c/code\u003e\u003cbr\u003euses: And.intro"}, {"color": "#4C9BE8", "font": {"color": "white"}, "id": "gc_360b97f0453f", "label": "case right.left\nq", "shape": "ellipse", "size": 20, "title": "\u003cb\u003eGoal\u003c/b\u003e\u003cbr\u003e\u003ccode\u003eq\u003c/code\u003e\u003cbr\u003ecase: right.left\u003cbr\u003evars: p q : Prop; hp : p; hq : q\u003cbr\u003e"}, {"color": "#4C9BE8", "font": {"color": "white"}, "id": "gc_4f7a13c584a2", "label": "case right.right\np", "shape": "ellipse", "size": 20, "title": "\u003cb\u003eGoal\u003c/b\u003e\u003cbr\u003e\u003ccode\u003ep\u003c/code\u003e\u003cbr\u003ecase: right.right\u003cbr\u003evars: p q : Prop; hp : p; hq : q\u003cbr\u003e"}, {"color": "#F4A261", "font": {"color": "white"}, "id": "t3", "label": "exact hq", "shape": "box", "size": 15, "title": "\u003cb\u003eTactic [3]\u003c/b\u003e\u003cbr\u003e\u003ccode\u003eexact hq\u003c/code\u003e\u003cbr\u003e"}, {"color": "#F4A261", "font": {"color": "white"}, "id": "t4", "label": "exact hp", "shape": "box", "size": 15, "title": "\u003cb\u003eTactic [4]\u003c/b\u003e\u003cbr\u003e\u003ccode\u003eexact hp\u003c/code\u003e\u003cbr\u003e"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#888888", "from": "gc_a1d2b73c658f", "to": "t0", "width": 2}, {"arrows": "to", "color": "#E76F51", "from": "t0", "to": "gc_ae1d8782dc0f", "width": 2}, {"arrows": "to", "color": "#E76F51", "from": "t0", "to": "gc_45f722079cbd", "width": 2}, {"arrows": "to", "color": "#888888", "from": "gc_ae1d8782dc0f", "to": "t1", "width": 2}, {"arrows": "to", "color": "#888888", "from": "gc_45f722079cbd", "to": "t2", "width": 2}, {"arrows": "to", "color": "#E76F51", "from": "t2", "to": "gc_360b97f0453f", "width": 2}, {"arrows": "to", "color": "#E76F51", "from": "t2", "to": "gc_4f7a13c584a2", "width": 2}, {"arrows": "to", "color": "#888888", "from": "gc_360b97f0453f", "to": "t3", "width": 2}, {"arrows": "to", "color": "#888888", "from": "gc_4f7a13c584a2", "to": "t4", "width": 2}]);

                  nodeColors = {};

                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;

                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"layout": {"hierarchical": {"enabled": true, "direction": "LR", "sortMethod": "directed", "nodeSpacing": 130, "levelSeparation": 200}}, "physics": {"enabled": false}, "edges": {"arrows": {"to": {"enabled": true, "scaleFactor": 0.8}}, "smooth": {"type": "cubicBezier"}}, "nodes": {"font": {"size": 13}, "borderWidth": 2}, "interaction": {"navigationButtons": true, "keyboard": true, "hover": true}};

                  return network;
